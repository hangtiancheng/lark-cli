# Air configuration for larky-go
# Install: go install github.com/air-verse/air@latest
# Run:     air

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/larky"
  cmd = "go build -o ./tmp/larky ./cmd/larky"
  delay = 1000
  exclude_dir = ["tmp", "vendor", ".larky"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
